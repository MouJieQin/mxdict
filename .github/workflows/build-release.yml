name: Build & Release FstDict

on:
    push:
        tags:
            - "v*"
    workflow_dispatch:

permissions:
    contents: write

jobs:
    build:
        name: Build ${{ matrix.platform }} (${{ matrix.arch }})
        runs-on: ${{ matrix.os }}
        strategy:
            fail-fast: false
            matrix:
                include:
                    # macOS Apple Silicon
                    - os: macos-14
                      platform: macos
                      arch: aarch64
                      rust_target: aarch64-apple-darwin
                      pyinstaller_arch: arm64

                    # macOS Intel (Running on Apple Silicon via Rosetta)
                    - os: macos-14 # Use the ARM runner
                      platform: macos
                      arch: x86_64
                      rust_target: x86_64-apple-darwin
                      pyinstaller_arch: x86_64

                    # Linux x86_64
                    - os: ubuntu-latest
                      platform: linux
                      arch: x86_64
                      rust_target: x86_64-unknown-linux-gnu
                      pyinstaller_arch: x86_64

                    # Windows x86_64
                    - os: windows-latest
                      platform: windows
                      arch: x86_64
                      rust_target: x86_64-pc-windows-msvc
                      pyinstaller_arch: AMD64

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            # ─────────────────────────────────────────
            # 1. Node.js + Frontend Build
            # ─────────────────────────────────────────
            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "npm"

            - name: Install frontend dependencies
              run: npm ci

            - name: Build Vue frontend
              run: npm run build

            # ─────────────────────────────────────────
            # 2. Python + PyInstaller Sidecar Build
            # ─────────────────────────────────────────
            - name: Setup Python
              if: matrix.platform != 'macos' || matrix.arch != 'x86_64'
              uses: actions/setup-python@v5
              with:
                  python-version: "3.11"

            - name: Setup Python (macos x86_64)
              if: matrix.platform == 'macos' && matrix.arch == 'x86_64'
              uses: actions/setup-python@v5
              with:
                  python-version: "3.11"
                  architecture: "x64"

            - name: Install Python dependencies
              working-directory: src-python
              run: |
                  python -m pip install --upgrade pip
                  pip install -r requirements.txt
                  pip install pyinstaller

            - name: Copy Vue dist to Python static (Unix)
              if: matrix.platform != 'windows'
              run: |
                  rm -rf src-python/static
                  cp -r dist src-python/static

            - name: Copy Vue dist to Python static (Windows)
              if: matrix.platform == 'windows'
              run: |
                  if (Test-Path src-python\static) { Remove-Item -Recurse -Force src-python\static }
                  Copy-Item -Recurse dist src-python\static

            - name: Build Python sidecar (Unix)
              if: matrix.platform != 'windows'
              working-directory: src-python
              run: |
                  pyinstaller \
                    --clean \
                    -y \
                    --onedir \
                    --noconsole \
                    --name fstdict-server \
                    --add-data "static:static" \
                    --add-data "config.json:." \
                    fstdict-server.py

            - name: Build Python sidecar (Windows)
              if: matrix.platform == 'windows'
              working-directory: src-python
              run: |
                  pyinstaller --clean --onedir --noconsole --name fstdict-server --add-data "static;static" --add-data "config.json;." fstdict-server.py

            - name: Place sidecar in Tauri sidecars directory
              shell: bash
              run: |
                  mkdir -p src-tauri/sidecars
                  rm -rf src-tauri/sidecars/fstdict-server
                  cp -r src-python/dist/fstdict-server src-tauri/sidecars/fstdict-server
                  echo "Sidecar placed at src-tauri/sidecars/fstdict-server/"
                  ls -la src-tauri/sidecars/fstdict-server/

            # ─────────────────────────────────────────
            # 3. Rust + Tauri Build
            # ─────────────────────────────────────────
            - name: Setup Rust
              uses: dtolnay/rust-toolchain@stable
              with:
                  targets: ${{ matrix.rust_target }}

            - name: Install Tauri system dependencies (Linux)
              if: matrix.platform == 'linux'
              run: |
                  sudo apt-get update
                  sudo apt-get install -y \
                    libwebkit2gtk-4.1-dev \
                    build-essential \
                    curl \
                    wget \
                    file \
                    libxdo-dev \
                    libssl-dev \
                    libayatana-appindicator3-dev \
                    librsvg2-dev

            - name: Build Tauri app
              uses: tauri-apps/tauri-action@v0
              with:
                  args: --target ${{ matrix.rust_target }}
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            # ─────────────────────────────────────────
            # 4. Upload Artifacts
            # ─────────────────────────────────────────
            - name: Upload build artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: fstdict-${{ matrix.platform }}-${{ matrix.arch }}
                  path: |
                      src-tauri/target/${{ matrix.rust_target }}/release/bundle/**/*
                  retention-days: 7

    # ═══════════════════════════════════════════
    # Release Job
    # ═══════════════════════════════════════════
    release:
        name: Create GitHub Release
        needs: build
        if: startsWith(github.ref, 'refs/tags/v')
        runs-on: ubuntu-latest
        steps:
            - name: Download all artifacts
              uses: actions/download-artifact@v4
              with:
                  path: ./dist
                  pattern: fstdict-*
                  merge-multiple: false

            - name: List release assets
              run: find ./dist -type f | sort

            - name: Create GitHub Release
              uses: softprops/action-gh-release@v2
              with:
                  files: |
                      ./dist/**/*.dmg
                      ./dist/**/*.AppImage
                      ./dist/**/*.msi
                      ./dist/**/*.exe
                      ./dist/**/*.deb
                      ./dist/**/*.rpm
                  generate_release_notes: true
                  draft: false
                  prerelease: false
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
